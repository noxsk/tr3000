#
# Workflow: 仅编译 luci-app-nat66 插件 (PKGARCH:=all, 纯 LuCI)
# 触发: 手动 或 push 到 package/luci-app-nat66/**
#
# nat66 无原生代码，但需要 po2lmo 命令（来自 luci-base）。
# 使用 x86_64 目标避免交叉编译工具链问题。
#

name: Build luci-app-nat66

on:
  workflow_dispatch:
  push:
    paths:
      - 'package/luci-app-nat66/**'

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@main

    - name: Install build dependencies
      run: |
        sudo apt-get -qq update
        sudo apt-get -qq install -y build-essential gawk gettext libncurses5-dev \
          libssl-dev unzip zlib1g-dev wget python3 file

    - name: Clone OpenWrt source
      run: |
        git clone https://github.com/coolsnowwolf/lede -b master --depth=1 openwrt
        cp -r "$GITHUB_WORKSPACE/package/luci-app-nat66" openwrt/package/

    - name: Update & install feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Setup config (x86_64 — same arch as runner)
      run: |
        cd openwrt
        echo "CONFIG_TARGET_x86=y" > .config
        echo "CONFIG_TARGET_x86_64=y" >> .config
        echo "CONFIG_TARGET_x86_64_DEVICE_generic=y" >> .config
        echo "CONFIG_PACKAGE_luci-app-nat66=y" >> .config
        make defconfig

    - name: Build tools + toolchain
      run: |
        cd openwrt
        make tools/install -j$(nproc) V=s
        make toolchain/install -j$(nproc) V=s

    - name: Compile luci-app-nat66 only
      run: |
        cd openwrt
        make package/luci-app-nat66/compile V=s -j1

    - name: Upload .ipk artifact
      uses: actions/upload-artifact@v4
      with:
        name: luci-app-nat66
        path: openwrt/bin/packages/*/base/luci-app-nat66*.ipk
        if-no-files-found: error
